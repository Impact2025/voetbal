name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22

jobs:
  # ─── player-hub (hoofd-app) ──────────────────────────────────────────────
  player-hub:
    name: player-hub (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: player-hub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: player-hub/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test -- --run

  # ─── player-pwa ──────────────────────────────────────────────────────────
  player-pwa:
    name: player-pwa (build check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: player-pwa

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build

  # ─── website ─────────────────────────────────────────────────────────────
  website:
    name: website (build check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
